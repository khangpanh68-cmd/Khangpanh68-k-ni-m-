<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SUPREME LOVE 2026 | AUTOPILOT V64</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Quicksand:wght@300;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --gold: #fcc201; --pink: #ff4d6d; --cyan: #00f2ff; --night-blue: #1a2a6c;
            --sun-color: #ff9d00; --moon-color: #f1f1f1;
            --dynamic-color: var(--cyan);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { height: 100vh; background: #000; overflow: hidden; font-family: 'Quicksand', sans-serif; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: background 2s; }

        /* RADAR V64 CELESTIAL */
        .radar-v64 {
            width: 280px; height: 280px; border-radius: 50%;
            position: relative; display: flex; align-items: center; justify-content: center;
            border: 2px solid var(--dynamic-color);
            box-shadow: 0 0 40px var(--dynamic-color);
            transition: 2s ease; z-index: 10;
        }
        .celestial-icon { position: absolute; top: -20px; font-size: 2rem; filter: drop-shadow(0 0 10px white); z-index: 11; transition: 1s; }
        
        .marker { position: absolute; width: 14px; height: 14px; border-radius: 50%; z-index: 12; }
        .vinh-long { top: 70%; left: 25%; background: var(--gold); box-shadow: 0 0 20px var(--gold); }
        .tp-hcm { top: 30%; left: 75%; background: var(--pink); box-shadow: 0 0 20px var(--pink); }

        /* SCANNER */
        .scan-v64 {
            position: absolute; width: 50%; height: 2px; background: linear-gradient(90deg, var(--dynamic-color), transparent);
            left: 50%; top: 50%; transform-origin: left center; animation: rotate 4s linear infinite;
        }

        /* LIVE COUNTER */
        .counter-box { text-align: center; margin: 20px 0; }
        .days-val { font-family: 'Orbitron'; font-size: 5.5rem; font-weight: 900; line-height: 1; text-shadow: 0 0 30px var(--dynamic-color); }
        .time-live { font-family: 'Orbitron'; font-size: 0.9rem; color: #fff; opacity: 0.6; letter-spacing: 3px; }

        /* MISSION & MESSAGE BOX */
        .msg-container {
            width: 88%; padding: 20px; background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 25px;
            backdrop-filter: blur(15px); text-align: center; margin-bottom: 15px;
        }
        .btn-v64 {
            padding: 15px 40px; border-radius: 50px; border: 1.5px solid var(--dynamic-color);
            background: transparent; color: var(--dynamic-color); font-family: 'Orbitron';
            font-weight: 900; font-size: 0.7rem; cursor: pointer; transition: 0.4s;
        }
        .btn-v64:active { background: var(--dynamic-color); color: #000; }

        /* ANIMATIONS */
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        /* MODAL */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(20px); }
        .modal-card { width: 85%; background: #fff; padding: 35px 20px; border-radius: 40px; color: #000; text-align: center; position: relative; }
        .modal-card h2 { font-family: 'Dancing Script'; font-size: 2.5rem; color: var(--pink); }
    </style>
</head>
<body>

    <!-- BACKGROUND EFFECTS -->
    <div id="sky-effect" style="position: fixed; inset: 0; pointer-events: none;"></div>

    <div id="gate" style="position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center;">
        <div onclick="initV64()" style="padding: 20px 40px; border: 2px solid var(--cyan); color: var(--cyan); font-family: 'Orbitron'; cursor: pointer; border-radius: 10px; box-shadow: 0 0 30px var(--cyan);">
            Gửi Bé Yêu ♥️👑
        </div>
    </div>

    <audio id="bgm" loop><source src="https://files.catbox.moe/6qjxys" type="audio/mpeg"></audio>

    <div id="main-app" style="display: none; opacity: 0; transition: 2s; width: 100%; flex-direction: column; align-items: center;">
        
        <div id="celestial-label" style="font-family: 'Orbitron'; font-size: 0.6rem; letter-spacing: 5px; margin-bottom: 15px; color: var(--dynamic-color);">SYSTEM: SYNCING...</div>

        <div class="radar-v64" id="radar">
            <div id="sun-moon" class="celestial-icon"></div>
            <div class="scan-v64"></div>
            <div class="marker vinh-long"></div>
            <div class="marker tp-hcm"></div>
            <div style="position: absolute; bottom: 30px; font-family: 'Orbitron'; font-size: 0.4rem; opacity: 0.5;">Yêu Bé Phương Anh ♥️👑</div>
        </div>

        <div class="counter-box">
            <div id="days-val" class="days-val">0</div>
            <div id="time-val" class="time-live">00:00:00</div>
        </div>

        <div class="msg-container">
            <p style="font-family: 'Orbitron'; font-size: 0.5rem; color: var(--pink); margin-bottom: 10px;">Nhiệm Vụ</p>
            <p id="daily-quest" style="font-size: 0.9rem; font-weight: 600;"></p>
        </div>

        <button class="btn-v64" onclick="openSleepMsg()">Chúc Bé Ngon Ngủ ♥️👑</button>
    </div>

    <div id="overlay" class="overlay">
        <div class="modal-card">
            <h2 id="modal-title"></h2>
            <p id="modal-text" style="margin: 20px 0; font-weight: 600; line-height: 1.6;"></p>
            <div id="modal-extra" style="font-size: 0.6rem; color: #888; font-family: 'Orbitron'; border-top: 1px solid #eee; padding-top: 10px;"></div>
            <button onclick="closeMsg()" style="margin-top: 25px; width: 100%; padding: 15px; border-radius: 50px; background: #000; color: #fff; border: none; font-family: 'Orbitron';">Yêu Bé ❤️</button>
        </div>
    </div>

    <script>
        const HOLIDAYS = {
            "01-01": "Tết Dương Lịch: Năm mới Khang vẫn sẽ yêu Anh nhiều nhất!",
            "02-14": "Valentine: Thế giới có 8 tỷ người, nhưng radar của Khang chỉ hiện mỗi tên em.",
            "03-08": "8/3: Chúc công chúa của Khang hôm nay rạng rỡ như ánh mặt trời!",
            "10-20": "20/10: Cảm ơn em đã xuất hiện và làm đẹp thế giới của Khang.",
            "12-25": "Giáng Sinh: Giáng sinh ấm áp nhé, em là món quà lớn nhất của anh.",
            "01-21": "KỶ NIỆM NGÀY YÊU: Mãi bên nhau như thế này em nhé ❤️"
        };

        const GOODNIGHT_BASE = [
            "Chúc em ngủ ngon, mơ thấy Khang và những điều ngọt ngào nhất.",
            "Ngủ đi thôi bé ơi, Khang đã canh giữ radar cho em rồi.",
            "Chúc em có một giấc mơ 4K siêu nét, trong đó có Khang cầm tay em.",
            "Hôm nay em đã vất vả rồi, ngủ thật ngon để mai lại xinh đẹp nhé.",
            "Nếu đêm nay thấy lạnh, hãy nhớ rằng tình cảm của Khang luôn sưởi ấm em.",
            "Ngủ ngon nhé, cục vàng của Khang. Hẹn gặp em trong mơ!",
            "Khang vừa gửi một nụ hôn qua vệ tinh, em nhận được chưa?"
        ];

        function initV64() {
            document.getElementById('bgm').play().catch(() => {});
            document.getElementById('gate').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('gate').style.display = 'none';
                document.getElementById('main-app').style.display = 'flex';
                setTimeout(() => document.getElementById('main-app').style.opacity = '1', 50);
                updateCelestial();
                runCounters();
            }, 800);
        }

        function updateCelestial() {
            const h = new Date().getHours();
            const radar = document.getElementById('radar');
            const icon = document.getElementById('sun-moon');
            const label = document.getElementById('celestial-label');
            const sky = document.getElementById('sky-effect');

            if (h >= 6 && h < 18) {
                // CHẾ ĐỘ BAN NGÀY
                document.body.style.background = "radial-gradient(circle at center, #2c3e50 0%, #000 100%)";
                document.documentElement.style.setProperty('--dynamic-color', 'var(--sun-color)');
                icon.innerHTML = "☀️";
                label.innerText = "SYSTEM: SOLAR_MODE ACTIVE";
            } else {
                // CHẾ ĐỘ BAN ĐÊM
                document.body.style.background = "radial-gradient(circle at center, #1a2a6c 0%, #000 100%)";
                document.documentElement.style.setProperty('--dynamic-color', 'var(--cyan)');
                icon.innerHTML = "🌙";
                label.innerText = "Cục Vàng Phương Anh";
                spawnStars();
            }
        }

        function spawnStars() {
            const sky = document.getElementById('sky-effect');
            for(let i=0; i<50; i++) {
                const star = document.createElement('div');
                star.style.position = 'absolute';
                star.style.width = '2px'; star.style.height = '2px';
                star.style.background = '#fff';
                star.style.top = Math.random() * 100 + '%';
                star.style.left = Math.random() * 100 + '%';
                star.style.opacity = Math.random();
                star.style.borderRadius = '50%';
                sky.appendChild(star);
            }
        }

        function runCounters() {
            const start = new Date('2023-01-21T00:00:00');
            setInterval(() => {
                const now = new Date();
                const diff = now - start;
                document.getElementById('days-val').innerText = Math.floor(diff / 86400000);
                document.getElementById('time-val').innerText = now.toLocaleTimeString('vi-VN');
                
                // Mission Update
                const quests = ["Nhắn tin bảo Khang em nhớ Khang đi!", "Uống 1 cốc nước lớn nhé.", "Mỉm cười trước gương 3 giây nào.", "Kể Khang nghe 1 điều vui hôm nay."];
                document.getElementById('daily-quest').innerText = quests[now.getDate() % quests.length];
            }, 1000);
        }

        function openSleepMsg() {
            const now = new Date();
            const dateStr = String(now.getMonth() + 1).padStart(2, '0') + "-" + String(now.getDate()).padStart(2, '0');
            let title = "Gửi Phương Anh ❤️";
            let message = "";

            // Kiểm tra ngày lễ
            if (HOLIDAYS[dateStr]) {
                title = "HÔM NAY ĐẶC BIỆT ✨";
                message = HOLIDAYS[dateStr];
            } else {
                // Tin nhắn 365 ngày (Lấy ngẫu nhiên theo ngày trong năm)
                const dayOfYear = Math.floor((now - new Date(now.getFullYear(), 0, 0)) / 86400000);
                message = GOODNIGHT_BASE[dayOfYear % GOODNIGHT_BASE.length];
                
                const hr = now.getHours();
                if(hr >= 6 && hr < 18) {
                    message = "Chúc em buổi sáng/trưa tràn đầy năng lượng! Đừng quên là Khang luôn nghĩ về em.";
                }
            }

            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-text').innerText = message;
            document.getElementById('modal-extra').innerText = "Ngày Kỷ Niệm Của Chúng Ta 21/01/2023-" + (now.getDate() * 123);
            document.getElementById('overlay').style.display = 'flex';
        }

        function closeMsg() { document.getElementById('overlay').style.display = 'none'; }
    </script>
</body>
</html>
