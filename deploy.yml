name: Deploy Supreme Love Autopilot V64

on:
  push:
    branches:
      - main  # Tự động chạy khi bạn push code lên nhánh main
  workflow_dispatch: # Cho phép bạn bấm nút chạy thủ công trong GitHub Actions

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Triển khai toàn bộ mã nguồn trong thư mục gốc
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        
