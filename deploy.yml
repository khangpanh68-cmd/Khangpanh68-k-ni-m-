name: Deploy Love Project V15

# Kích hoạt khi có thay đổi ở nhánh main hoặc master
on:
  push:
    branches: ["main", "master"]
  
  # Cho phép chạy thủ công từ giao diện GitHub Actions
  workflow_dispatch:

# Thiết lập quyền hạn tối ưu cho GitHub Pages 2026
permissions:
  contents: read
  pages: write
  id-token: write

# Đảm bảo không bị xung đột khi bạn cập nhật code liên tục
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    # Thiết lập môi trường triển khai
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    runs-on: ubuntu-latest
    
    steps:
      - name: 📂 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: 📤 Upload file lên Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Triển khai toàn bộ file tại thư mục gốc (nơi chứa index.html)
          path: '.'

      - name: 🚀 Triển khai lên GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
