name: 💖 Deploy Love Project V15 Ultra HD+

# Tự động hóa quy trình triển khai khi có thay đổi
on:
  push:
    branches: ["main", "master"] # Chạy khi bạn push code vào nhánh chính
  
  # Hỗ trợ kiểm tra hoặc chạy thủ công từ tab Actions
  workflow_dispatch:

# Cấu hình quyền hạn (Permissions) cho GitHub Pages 2026
permissions:
  contents: read      # Quyền đọc mã nguồn
  pages: write        # Quyền ghi/xuất bản lên Pages
  id-token: write     # Quyền xác thực danh tính bảo mật

# Quản lý hàng chờ triển khai (Chỉ chạy bản mới nhất, hủy các bản cũ đang chờ)
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy-love-site:
    # Định nghĩa môi trường chạy cho GitHub
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    runs-on: ubuntu-latest
    
    steps:
      - name: 📂 Bước 1: Lấy mã nguồn từ Repository
        uses: actions/checkout@v4

      - name: ⚙️ Bước 2: Khởi tạo cấu hình GitHub Pages
        uses: actions/configure-pages@v5

      - name: 📦 Bước 3: Đóng gói tài nguyên (Artifact)
        uses: actions/upload-pages-artifact@v3
        with:
          # Triển khai toàn bộ file tại thư mục gốc (nơi chứa index.html)
          path: '.'

      - name: 🚀 Bước 4: Chạy tiến trình xuất bản lên Internet
        id: deployment
        uses: actions/deploy-pages@v4
